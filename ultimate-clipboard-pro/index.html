<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#8b5cf6">
  <title>Ultimate Clipboard Pro - ArcaWand Soft</title>
  <meta name="description" content="Ultimate Clipboard Pro captures, organizes, searches and reuses text, code and images while you browse.">
  <link rel="icon" type="image/png" href="../assets/Arcawand_Soft_Favicon.png">
  <link rel="stylesheet" crossorigin href="./assets/index-BcSrau0n.css">
  <style>
    header.fixed.top-0.left-0.right-0 { display: none !important; }
    body { scroll-padding-top: 0 !important; }
    #hero { padding-top: 2rem !important; }
    .arcawand-root-return { position: fixed; left: 1rem; top: 1rem; z-index: 60; display: inline-flex; align-items: center; gap: .5rem; min-height: 2.6rem; padding: 0 .9rem; border-radius: 999px; border: 1px solid rgba(255,255,255,.14); background: rgba(10,12,22,.58); color: #fff; font: 800 .85rem Geist, system-ui, sans-serif; backdrop-filter: blur(16px); box-shadow: 0 18px 40px rgba(0,0,0,.22); }
    .arcawand-root-return:hover { background: hsl(var(--primary)); }
    .ucp-product-mark { position: fixed; left: 50%; top: 1rem; z-index: 60; display: inline-flex; align-items: center; gap: .7rem; min-height: 2.6rem; transform: translateX(-50%); color: #fff; font: 950 1.08rem/1 Geist, system-ui, sans-serif; letter-spacing: 0; text-shadow: 0 10px 28px rgba(0,0,0,.34); pointer-events: none; }
    .ucp-product-mark img { width: 2.85rem; height: 2.85rem; object-fit: contain; display: block; background: transparent; border: 0; box-shadow: none; }
    .ucp-product-title { white-space: nowrap; }
    .ucp-footer-product-icon-wrap { width: 2.75rem; height: 2.75rem; display: inline-flex; align-items: center; justify-content: center; background: transparent; border: 0; box-shadow: none; border-radius: 0; flex: 0 0 auto; }
    .ucp-footer-product-icon { width: 2.55rem; height: 2.55rem; display: block; object-fit: contain; background: transparent; border: 0; box-shadow: none; }
    .ucp-footer-arcawand-link { display: inline-flex; width: max-content; align-items: center; background: transparent; border: 0; }
    .ucp-footer-arcawand-logo { width: clamp(112px, 11vw, 150px); height: auto; display: block; object-fit: contain; background: transparent; border: 0; }
    .arcawand-product-language { position: fixed; right: 1rem; top: 1rem; z-index: 60; min-height: 2.6rem; padding: 0 2.1rem 0 .9rem; border-radius: 999px; border: 1px solid rgba(255,255,255,.14); background: rgba(10,12,22,.58); color: #fff; font: 800 .85rem Geist, system-ui, sans-serif; backdrop-filter: blur(16px); box-shadow: 0 18px 40px rgba(0,0,0,.22); cursor: pointer; appearance: none; background-image: linear-gradient(45deg, transparent 50%, currentColor 50%), linear-gradient(135deg, currentColor 50%, transparent 50%); background-position: calc(100% - 17px) 50%, calc(100% - 12px) 50%; background-size: 5px 5px; background-repeat: no-repeat; }
    .arcawand-product-language option { color: #111827; background: #fff; }
    @media (max-width: 640px) {
      .arcawand-root-return { left: .75rem; top: .75rem; }
      .ucp-product-mark { top: .72rem; }
      .ucp-product-mark img { width: 2.55rem; height: 2.55rem; }
      .ucp-product-title { display: none; }
      .arcawand-product-language { right: .75rem; top: .75rem; }
    }
  </style>
  <script type="module" crossorigin src="./assets/index-BRdfzjER.js"></script>
</head>
<body>
  <a class="arcawand-root-return" href="../" aria-label="Back to ArcaWand Soft">← ArcaWand Soft</a>
  <div class="ucp-product-mark" aria-label="Ultimate Clipboard Pro">
    <img src="../assets/ultimate_clipboard_pro_icon.png" alt="">
    <span class="ucp-product-title">Ultimate Clipboard Pro</span>
  </div>
  <select class="arcawand-product-language" aria-label="Language">
    <option value="en">EN</option>
    <option value="fr">FR</option>
    <option value="es">ES</option>
    <option value="it">IT</option>
    <option value="de">DE</option>
  </select>
  <div id="root"></div>
  <script>
    (() => {
      const supported = ["en", "fr", "es", "it", "de"];
      const detectLang = () => {
        const saved = localStorage.getItem("arcawand-lang") || localStorage.getItem("ucp-lang");
        if (supported.includes(saved)) return saved;
        const langs = navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || "en"];
        return langs.map((lang) => String(lang).slice(0, 2).toLowerCase()).find((lang) => supported.includes(lang)) || "en";
      };
      const select = document.querySelector(".arcawand-product-language");
      const lang = detectLang();
      document.documentElement.lang = lang;
      localStorage.setItem("arcawand-lang", lang);
      localStorage.setItem("ucp-lang", lang);
      if (select) {
        select.value = lang;
        select.addEventListener("change", () => {
          localStorage.setItem("arcawand-lang", select.value);
          localStorage.setItem("ucp-lang", select.value);
          window.location.reload();
        });
      }
    })();
  </script>
  <script>
    (() => {
      const homeUrl = "https://arcawand-soft.com/";
      const productIconUrl = "../assets/ultimate_clipboard_pro_icon.png";
      const arcawandLogoUrl = "../assets/Arcawand_Soft_Logo.png";

      function patchProductFooter() {
        const footer = document.querySelector("footer");
        if (!footer) return false;

        const iconBox = Array.from(footer.querySelectorAll("div")).find((node) =>
          node.classList.contains("w-8") &&
          node.classList.contains("h-8") &&
          node.classList.contains("bg-gradient-to-br") &&
          node.classList.contains("justify-center")
        );

        if (iconBox && !iconBox.dataset.arcawandFooterIcon) {
          iconBox.dataset.arcawandFooterIcon = "true";
          iconBox.className = "ucp-footer-product-icon-wrap";
          iconBox.replaceChildren();
          const icon = document.createElement("img");
          icon.className = "ucp-footer-product-icon";
          icon.src = productIconUrl;
          icon.alt = "";
          icon.setAttribute("aria-hidden", "true");
          iconBox.appendChild(icon);
        }

        const brandText = footer.querySelector(".space-y-4 > p.text-sm.text-muted-foreground");
        if (brandText && !brandText.dataset.arcawandFooterLogo) {
          brandText.dataset.arcawandFooterLogo = "true";
          brandText.replaceChildren();
          const link = document.createElement("a");
          link.className = "ucp-footer-arcawand-link";
          link.href = homeUrl;
          link.setAttribute("aria-label", "ArcaWand Soft");
          const logo = document.createElement("img");
          logo.className = "ucp-footer-arcawand-logo";
          logo.src = arcawandLogoUrl;
          logo.alt = "ArcaWand Soft";
          link.appendChild(logo);
          brandText.appendChild(link);
        }

        return Boolean(iconBox || brandText);
      }

      if (!patchProductFooter()) {
        const observer = new MutationObserver(() => {
          if (patchProductFooter()) observer.disconnect();
        });
        observer.observe(document.getElementById("root") || document.body, { childList: true, subtree: true });
      }
      window.addEventListener("load", patchProductFooter, { once: true });
    })();
  </script>
  <script>
    (() => {
      const checkoutUrl = "https://checkout.dodopayments.com/buy/pdt_0NeBVHHvl7TdkOznAvJOk?quantity=1";
      const proCtaPatterns = [
        "get pro",
        "unlock pro",
        "pro lifetime",
        "obtenir pro",
        "débloquer pro",
        "obtener pro",
        "ottieni pro",
        "pro erhalten",
        "pro lebenslang",
        "pro à vie",
        "pro a vita",
        "pro de por vida"
      ];

      function isProCheckoutTarget(element) {
        if (!element || !element.matches("button, a")) return false;
        const label = (element.textContent || element.getAttribute("aria-label") || "").trim().toLowerCase();
        return label && proCtaPatterns.some((pattern) => label.includes(pattern));
      }

      document.addEventListener("click", (event) => {
        const target = event.target && event.target.closest ? event.target.closest("button, a") : null;
        if (!isProCheckoutTarget(target)) return;
        event.preventDefault();
        window.open(checkoutUrl, "_blank", "noopener,noreferrer");
      }, true);
    })();
  </script>
</body>
</html>
