  <div id="root"></div>
<script>
    (() => {
      const homeUrl = "https://arcawand-soft.com/";
      const productIconUrl = "../../assets/ultimate_clipboard_pro_icon_96.webp";
      const arcawandLogoUrl = "../../assets/Arcawand_Soft_Logo_320.webp";

      function patchProductFooter() {
        const footer = document.querySelector("footer");
        if (!footer) return false;

        const iconBox = Array.from(footer.querySelectorAll("div")).find((node) =>
          node.classList.contains("w-8") &&
          node.classList.contains("h-8") &&
          node.classList.contains("bg-gradient-to-br") &&
          node.classList.contains("justify-center")
        );

        if (iconBox && !iconBox.dataset.arcawandFooterIcon) {
          iconBox.dataset.arcawandFooterIcon = "true";
          iconBox.className = "ucp-footer-product-icon-wrap";
          iconBox.replaceChildren();
          const icon = document.createElement("img");
          icon.className = "ucp-footer-product-icon";
          icon.src = productIconUrl;
          icon.alt = "";
          icon.setAttribute("aria-hidden", "true");
          iconBox.appendChild(icon);
        }

        const brandText = footer.querySelector(".space-y-4 > p.text-sm.text-muted-foreground");
        if (brandText && !brandText.dataset.arcawandFooterLogo) {
          brandText.dataset.arcawandFooterLogo = "true";
          brandText.replaceChildren();
          const link = document.createElement("a");
          link.className = "ucp-footer-arcawand-link";
          link.href = homeUrl;
          link.setAttribute("aria-label", "ArcaWand Soft");
          const logo = document.createElement("img");
          logo.className = "ucp-footer-arcawand-logo";
          logo.src = arcawandLogoUrl;
          logo.alt = "ArcaWand Soft";
          link.appendChild(logo);
          brandText.appendChild(link);
        }

        return Boolean(iconBox || brandText);
      }

      if (!patchProductFooter()) {
        const observer = new MutationObserver(() => {
          if (patchProductFooter()) observer.disconnect();
        });
        observer.observe(document.getElementById("root") || document.body, { childList: true, subtree: true });
      }
      window.addEventListener("load", patchProductFooter, { once: true });
    })();
  </script>

        "get pro",

        "pro lifetime",
        "obtenir pro",
        "débloquer pro",
        "obtener pro",
        "ottieni pro",
        "pro erhalten",

        "pro à vie",
        "pro a vita",
        "pro de por vida"
      ];

      function isProCheckoutTarget(element) {
        if (!element || !element.matches("button, a")) return false;
        const label = (element.textContent || element.getAttribute("aria-label") || "").trim().toLowerCase();
        return label && proCtaPatterns.some((pattern) => label.includes(pattern));
      }

      document.addEventListener("click", (event) => {
        const target = event.target && event.target.closest ? event.target.closest("button, a") : null;
        if (!isProCheckoutTarget(target)) return;
        event.preventDefault();
        window.open(checkoutUrl, "_blank", "noopener,noreferrer");
      }, true);
    })();
